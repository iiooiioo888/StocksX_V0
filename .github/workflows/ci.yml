name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PIP_CACHE_DIR: ~/.cache/pip

jobs:
  # ════════════════════════════════════════════════════════════
  # Lint & Format Check
  # ════════════════════════════════════════════════════════════
  lint:
    name: 🔍 Ruff Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-lint-

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint check
        run: ruff check src/ pages/ app.py tests/

      - name: Ruff format check
        run: ruff format --check src/ pages/ app.py tests/

  # ════════════════════════════════════════════════════════════
  # Test (Matrix: Python 3.10 / 3.11 / 3.12)
  # ════════════════════════════════════════════════════════════
  test:
    name: 🧪 Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-test-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-test-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -v \
            --cov=src \
            --cov-report=xml:coverage-${{ matrix.python-version }}.xml \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --tb=short \
            --junitxml=junit-${{ matrix.python-version }}.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage-${{ matrix.python-version }}.xml
            junit-${{ matrix.python-version }}.xml
            htmlcov/

  # ════════════════════════════════════════════════════════════
  # Docker Build
  # ════════════════════════════════════════════════════════════
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: stocksx:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════════════
  # Deploy (Placeholder)
  # ════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

