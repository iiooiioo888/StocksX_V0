name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, "feat/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PIP_CACHE_DIR: ~/.cache/pip
  PYTHONPATH: ${{ github.workspace }}

permissions:
  contents: read
  security-events: write

jobs:
  # ════════════════════════════════════════════════════════════
  # Lint & Format Check
  # ════════════════════════════════════════════════════════════
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: pip-lint-

      - name: Install tools
        run: |
          pip install ruff mypy

      - name: Ruff lint check
        run: ruff check src/ pages/ app.py tests/

      - name: Ruff format check
        run: ruff format --check src/ pages/ app.py tests/

      - name: Type check (best effort)
        run: mypy src/core/ --ignore-missing-imports --no-error-summary || true

  # ════════════════════════════════════════════════════════════
  # Security Scan
  # ════════════════════════════════════════════════════════════
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install safety & bandit
        run: pip install safety bandit[toml]

      - name: Dependency vulnerability scan
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          safety check --output text || true

      - name: Static security analysis (bandit)
        run: |
          bandit -r src/ -ll -f json -o bandit-report.json || true
          bandit -r src/ -ll || true

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ════════════════════════════════════════════════════════════
  # Test (Matrix: Python 3.10 / 3.11 / 3.12)
  # ════════════════════════════════════════════════════════════
  test:
    name: 🧪 Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-test-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-test-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt || pip install streamlit plotly pandas numpy ccxt yfinance
          pip install pytest pytest-cov pytest-asyncio pytest-timeout

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -v \
            --cov=src \
            --cov-report=xml:coverage-${{ matrix.python-version }}.xml \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --tb=short \
            --timeout=60 \
            --junitxml=junit-${{ matrix.python-version }}.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage-${{ matrix.python-version }}.xml
            junit-${{ matrix.python-version }}.xml
            htmlcov/

  # ════════════════════════════════════════════════════════════
  # Docker Build & Push
  # ════════════════════════════════════════════════════════════
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════════════
  # Deploy
  # ════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Docker Compose (SSH)
        if: vars.DEPLOY_HOST != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST }}
          username: ${{ vars.DEPLOY_USER || 'root' }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ vars.DEPLOY_PATH || '/opt/stocksx' }}
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

      - name: Placeholder (no deploy target configured)
        if: vars.DEPLOY_HOST == ''
        run: |
          echo "═══════════════════════════════════════════════"
          echo "  ⚠️  No DEPLOY_HOST configured"
          echo "  Set repository variables:"
          echo "    DEPLOY_HOST — server IP/domain"
          echo "    DEPLOY_USER — SSH user (default: root)"
          echo "    DEPLOY_PATH — project path (default: /opt/stocksx)"
          echo "  And secret:"
          echo "    DEPLOY_SSH_KEY — SSH private key"
          echo "═══════════════════════════════════════════════"
