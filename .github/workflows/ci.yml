name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, "feat/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PIP_CACHE_DIR: ~/.cache/pip
  PYTHONPATH: ${{ github.workspace }}
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  # ════════════════════════════════════════════════════════════
  # Lint & Format Check
  # ════════════════════════════════════════════════════════════
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: pip-lint-

      - name: Install tools
        run: pip install ruff mypy

      - name: Ruff lint check
        run: ruff check src/ pages/ app.py tests/

      - name: Ruff format check
        run: ruff format --check src/ pages/ app.py tests/

      - name: Type check (best effort)
        run: mypy src/core/ --ignore-missing-imports --no-error-summary || true

  # ════════════════════════════════════════════════════════════
  # Security Scan
  # ════════════════════════════════════════════════════════════
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install safety & bandit
        run: pip install safety bandit[toml]

      - name: Dependency vulnerability scan
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          safety check --output text || true

      - name: Static security analysis (bandit)
        run: |
          bandit -r src/ -ll -f json -o bandit-report.json || true
          bandit -r src/ -ll || true

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json

  # ════════════════════════════════════════════════════════════
  # Test Matrix
  # ════════════════════════════════════════════════════════════
  test:
    name: 🧪 Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-test-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: pip-test-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest tests/ -v --timeout=60 --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml

      - name: Coverage report
        if: matrix.python-version == '3.12'
        run: |
          pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing --timeout=60

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ════════════════════════════════════════════════════════════
  # Docker Build & Push (GHCR)
  # ════════════════════════════════════════════════════════════
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
