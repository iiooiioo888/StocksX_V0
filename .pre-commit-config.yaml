repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-ast

  - repo: local
    hooks:
      - id: detect-github-token
        name: Detect GitHub Token
        entry: bash -c 'grep -rnE "ghp_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9_]{82}" "$@" && exit 1 || exit 0' --
        language: system
        types: [text]
