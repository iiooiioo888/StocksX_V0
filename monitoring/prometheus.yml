# Prometheus 配置
# 用於抓取 StocksX 指標

global:
  scrape_interval: 15s  # 每 15 秒抓取一次
  evaluation_interval: 15s

scrape_configs:
  # StocksX 指標
  - job_name: 'stocksx'
    static_configs:
      - targets: ['localhost:8001']
    metrics_path: '/metrics'
    
  # 系統指標
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
    
  # 數據庫指標（如果使用了 PostgreSQL）
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['localhost:9187']

# 告警規則
rule_files:
  - "alerts.yml"

# 告警管理器
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - localhost:9093
