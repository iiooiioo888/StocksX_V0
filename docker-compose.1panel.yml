# StocksX V0 - 1Panel 生产环境部署配置
# 使用方法：docker compose -f docker-compose.1panel.yml up -d

version: '3.8'

services:
  # ════════════════════════════════════════════════════════════
  # 主应用服务
  # ════════════════════════════════════════════════════════════
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocksx-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8501}:8501"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-stocksx_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stocksx}
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY:-}
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - stocksx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ════════════════════════════════════════════════════════════
  # PostgreSQL 数据库
  # ════════════════════════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    container_name: stocksx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stocksx}
      POSTGRES_USER: ${POSTGRES_USER:-stocksx_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups/db:/backups
    networks:
      - stocksx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stocksx_user} -d ${POSTGRES_DB:-stocksx}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ════════════════════════════════════════════════════════════
  # Redis 缓存
  # ════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: stocksx-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - stocksx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ════════════════════════════════════════════════════════════
  # WebSocket 服务（可选）
  # ════════════════════════════════════════════════════════════
  websocket:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocksx-websocket
    restart: unless-stopped
    command: python -m src.websocket_binance
    environment:
      - REDIS_URL=redis://redis:6379/0
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY:-}
    depends_on:
      - redis
    networks:
      - stocksx-network
    profiles:
      - websocket

  # ════════════════════════════════════════════════════════════
  # 数据库迁移（一次性）
  # ════════════════════════════════════════════════════════════
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocksx-migrate
    command: python -m src.database.migrate
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-stocksx_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stocksx}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stocksx-network
    profiles:
      - init

  # ════════════════════════════════════════════════════════════
  # Prometheus 监控（可选）
  # ════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: stocksx-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - stocksx-network
    profiles:
      - monitoring

  # ════════════════════════════════════════════════════════════
  # Grafana 可视化（可选）
  # ════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: stocksx-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - stocksx-network
    profiles:
      - monitoring

networks:
  stocksx-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
