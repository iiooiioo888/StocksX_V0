# ════════════════════════════════════════════════════════════
# Ruff - Python linter & formatter 配置
# ════════════════════════════════════════════════════════════
[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line too long（由 formatter 處理）
    "B008",   # function call in default argument（Streamlit 常見模式）
    "SIM108", # ternary（有時 if/else 更清晰）
    "N806",   # variable in function should be lowercase（plottly 常見）
]

[tool.ruff.lint.per-file-ignores]
"pages/*" = ["E402"]  # Streamlit pages 需要先 set_page_config
"app.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
