version: '3.8'

services:
  # ════════════════════════════════════════════════════════════
  # 主应用 - Streamlit
  # ════════════════════════════════════════════════════════════
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocksx-app
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite:///app/data/stocksx.db
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - stocksx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ════════════════════════════════════════════════════════════
  # WebSocket 服务
  # ════════════════════════════════════════════════════════════
  websocket:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocksx-websocket
    restart: unless-stopped
    command: python -m src.websocket_binance
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379
      - TZ=Asia/Shanghai
    depends_on:
      - redis
    networks:
      - stocksx-network

  # ════════════════════════════════════════════════════════════
  # Redis 缓存
  # ════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: stocksx-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - stocksx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ════════════════════════════════════════════════════════════
  # Celery Worker (可选)
  # ════════════════════════════════════════════════════════════
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocksx-celery
    restart: unless-stopped
    command: celery -A src.tasks worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379
      - TZ=Asia/Shanghai
    depends_on:
      - redis
    networks:
      - stocksx-network
    volumes:
      - ./logs:/app/logs

  # ════════════════════════════════════════════════════════════
  # 监控 - Prometheus (可选)
  # ════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: stocksx-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - stocksx-network

  # ════════════════════════════════════════════════════════════
  # 监控 - Grafana (可选)
  # ════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: stocksx-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - stocksx-network

networks:
  stocksx-network:
    driver: bridge

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
