services:
  # ════════════════════════════════════════════════════════════
  # 主應用 - Streamlit
  # ════════════════════════════════════════════════════════════
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocksx-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8501}:8501"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///app/data/stocksx.db
      - TZ=${TZ:-Asia/Shanghai}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - .env
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stocksx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ════════════════════════════════════════════════════════════
  # WebSocket 服務
  # ════════════════════════════════════════════════════════════
  websocket:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocksx-websocket
    restart: unless-stopped
    command: python -m src.websocket_server
    ports:
      - "${WS_PORT:-8001}:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - TZ=${TZ:-Asia/Shanghai}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stocksx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ════════════════════════════════════════════════════════════
  # Redis 緩存
  # ════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: stocksx-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    networks:
      - stocksx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ════════════════════════════════════════════════════════════
  # Celery Worker（可選）
  # ════════════════════════════════════════════════════════════
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocksx-celery
    restart: unless-stopped
    command: celery -A src.tasks worker --loglevel=info --concurrency=2
    environment:
      - REDIS_URL=redis://redis:6379/0
      - TZ=${TZ:-Asia/Shanghai}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stocksx-network
    volumes:
      - app_logs:/app/logs

  # ════════════════════════════════════════════════════════════
  # 監控 - Prometheus（可選）
  # ════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: stocksx-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - stocksx-network

  # ════════════════════════════════════════════════════════════
  # 監控 - Grafana（可選）
  # ════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: stocksx-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - stocksx-network

networks:
  stocksx-network:
    driver: bridge

volumes:
  app_data:
  app_logs:
  redis_data:
  prometheus_data:
  grafana_data:
