version: '3.8'

services:
  # ════════════════════════════════════════════════════════════
  # 主應用 — Streamlit Dashboard
  # ════════════════════════════════════════════════════════════
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocksx-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8501}:8501"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - REDIS_URL=redis://redis:6379/0
      - TZ=${TZ:-Asia/Shanghai}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - .env
    volumes:
      - app_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stocksx-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ════════════════════════════════════════════════════════════
  # Redis 緩存 & 任務隊列
  # ════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: stocksx-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - stocksx-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ════════════════════════════════════════════════════════════
  # WebSocket 即時推送（可選）
  # ════════════════════════════════════════════════════════════
  websocket:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocksx-websocket
    restart: unless-stopped
    command: python -m src.websocket_server
    ports:
      - "${WS_PORT:-8001}:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - TZ=${TZ:-Asia/Shanghai}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - stocksx-net
    profiles:
      - websocket

  # ════════════════════════════════════════════════════════════
  # Prometheus 監控（可選）
  # ════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: stocksx-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - stocksx-net
    profiles:
      - monitoring

  # ════════════════════════════════════════════════════════════
  # Grafana 視覺化（可選）
  # ════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: stocksx-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana_dashboard.json:/etc/grafana/provisioning/dashboards/stocksx.json:ro
    depends_on:
      - prometheus
    networks:
      - stocksx-net
    profiles:
      - monitoring

volumes:
  app_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  stocksx-net:
    driver: bridge
